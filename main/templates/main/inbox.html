<!DOCTYPE html>
<html>

<head>
    <title>Inbox</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        
        .inbox-container {
            width: 400px;
            margin: auto;
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
        
        .chat-card {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            transition: 0.3s;
        }
        
        .chat-card:hover {
            background: #f0f0f0;
        }
        
        .username {
            font-weight: bold;
        }
        
        .last-message {
            color: gray;
            font-size: 14px;
        }
        
        .unread {
            float: right;
            background: red;
            color: white;
            padding: 3px 8px;
            border-radius: 50%;
            font-size: 12px;
        }
        
        a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

    <div class="inbox-container">
        <h2>Inbox</h2>

        {% for chat in chat_data %}
        <a href="/chat/{{ chat.chat_id }}/">
            <div class="chat-card">
                <div class="username">
                    {{ chat.username }} {% if chat.unread > 0 %}
                    <span class="unread">{{ chat.unread }}</span> {% endif %}
                </div>

                <div class="last-message">
                    {{ chat.last_message }}
                </div>
            </div>
        </a>
        {% empty %}
        <p>No chats yet</p>
        {% endfor %}

    </div>

</body>

</html>

{% extends 'main/base.html' %} {% block content %}

<div class="chat-container">

    <div class="chat-header">
        <h3>
            Chat with {% if request.user == chat.client %} {{ chat.writer.username }} {% else %} {{ chat.client.username }} {% endif %}
        </h3>
    </div>

    <div class="chat-messages" id="chat-box">
        {% for msg in messages %}
        <div class="message {% if msg.sender == request.user %}sent{% else %}received{% endif %}">
            {{ msg.text }}
        </div>
        {% endfor %}
    </div>

    <form id="chat-form" class="chat-form">
        {% csrf_token %}
        <input type="text" id="message-input" placeholder="Type a message..." required>
        <button type="submit">Send</button>
    </form>

</div>

<script>
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const chatBox = document.getElementById("chat-box");

    // SEND MESSAGE
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const message = input.value.trim();
        if (!message) return;

        fetch("{% url 'send_message' chat.id %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value,
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: "message=" + encodeURIComponent(message)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {

                    // 🔥 message 
                    const div = document.createElement("div");
                    div.className = "message sent";
                    div.innerText = data.message;

                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;

                    input.value = "";
                }
            });
    });

    // AUTO REFRESH
    function loadMessages() {
        fetch("{% url 'get_messages' chat.id %}")
            .then(res => res.json())
            .then(data => {
                chatBox.innerHTML = "";

                data.messages.forEach(msg => {
                    const div = document.createElement("div");

                    if (msg.sender === "{{ request.user.username }}") {
                        div.className = "message sent";
                    } else {
                        div.className = "message received";
                    }

                    div.innerText = msg.text;
                    chatBox.appendChild(div);
                });

                chatBox.scrollTop = chatBox.scrollHeight;
            });
    }

    setInterval(loadMessages, 1000);
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            form.dispatchEvent(new Event("submit"));
        }
    });
</script>

{% endblock %}

{% extends 'main/base.html' %} {% block content %}

<div class="writers-container">

    <h1 class="writers-title">
        Hired Writers
    </h1>

    {% for chat in chats %}

    <div class="writer-card">

        <h2>{{ chat.writer.username }}</h2>

        <a href="{% url 'chat_page' chat.id %}" class="hire-btn">

           Open Chat

        </a>

    </div>

    {% empty %}

    <p>No hired writers yet.</p>

    {% endfor %}

</div>

{% endblock %}
